name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  format-check:
    name: dfmt format check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install D compiler
        uses: dlang-community/setup-dlang@v2
        with:
          compiler: ldc-latest

      # dfmt has no `--check` flag, so the idiom is format-in-place then fail if
      # the working tree changed. The dfmt config lives in dfmt.json.
      - name: Check formatting (dfmt)
        run: |
          dub run dfmt -- --inplace source/ vibe/ ed25519/ examples/
          git diff --exit-code

  dscanner-lint:
    name: dscanner lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install D compiler
        uses: dlang-community/setup-dlang@v2
        with:
          compiler: ldc-latest

      - name: D-Scanner static analysis
        run: ./scripts/dscanner-lint.sh

  build-and-test:
    name: core ${{ matrix.compiler }} on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        compiler: [ldc-latest, dmd-latest]
        os: [ubuntu-latest, macos-latest, windows-latest]
        # DMD ships no macOS/arm64 build and macos-latest is Apple Silicon, so
        # dmd-latest cannot install there; LDC covers macOS instead. On Windows
        # we gate the core on LDC (the recommended production toolchain there).
        exclude:
          - compiler: dmd-latest
            os: macos-latest
          - compiler: dmd-latest
            os: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install D compiler
        uses: dlang-community/setup-dlang@v2
        with:
          compiler: ${{ matrix.compiler }}

      # The core library is Phobos-only — no system dependencies.
      - name: Build (core)
        run: dub build

      - name: Test (core)
        run: dub test

  build-vibe:
    name: vibe subpackage on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install D compiler
        uses: dlang-community/setup-dlang@v2
        with:
          compiler: ldc-latest

      # vibe-d:http pulls in vibe-d:tls / openssl. Ubuntu runners ship OpenSSL
      # 3.x preinstalled; macOS needs it from Homebrew.
      - name: Install OpenSSL 3.x (macOS)
        if: runner.os == 'macOS'
        run: |
          brew install openssl@3
          echo "PKG_CONFIG_PATH=$(brew --prefix openssl@3)/lib/pkgconfig" >> "$GITHUB_ENV"

      - name: Build vibe subpackage
        run: dub build :vibe

  build-ed25519:
    name: ed25519 subpackage on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install D compiler
        uses: dlang-community/setup-dlang@v2
        with:
          compiler: ldc-latest

      # The ed25519 subpackage links the system libsodium for the ed25519
      # primitives.
      - name: Install libsodium (Linux)
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y libsodium-dev

      - name: Install libsodium (macOS)
        if: runner.os == 'macOS'
        run: brew install libsodium

      # Windows has no system libsodium, so vcpkg (preinstalled on the runner)
      # provides the import lib that dub's libs-windows: [libsodium] links, plus
      # the DLL the test binary loads at runtime.
      - name: Install libsodium (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          vcpkg install libsodium:x64-windows
          $root = "$env:VCPKG_INSTALLATION_ROOT/installed/x64-windows"
          "LIB=$root/lib;$env:LIB" | Out-File -FilePath $env:GITHUB_ENV -Append
          "$root/bin" | Out-File -FilePath $env:GITHUB_PATH -Append

      - name: Test ed25519 subpackage
        run: dub test :ed25519

  example:
    name: examples (build + run)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install D compiler
        uses: dlang-community/setup-dlang@v2
        with:
          compiler: ldc-latest

      - name: Install libsodium (for the asymmetric example)
        run: sudo apt-get update && sudo apt-get install -y libsodium-dev

      # Each example signs a payload then verifies it, exiting non-zero on any
      # mismatch — self-checking end-to-end smoke tests.
      - name: Build + run symmetric example
        run: dub run --root examples/sign-verify

      - name: Build + run asymmetric example
        run: dub run --root examples/asymmetric

  coverage:
    name: coverage to Codecov
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install D compiler
        uses: dlang-community/setup-dlang@v2
        with:
          compiler: ldc-latest

      - name: Test with coverage
        run: dub test --coverage

      - name: Convert coverage to lcov
        run: bash scripts/cov-to-lcov.sh lcov.info

      # On a PRIVATE repo this needs CODECOV_TOKEN in repo secrets AND the repo
      # activated on codecov.io; on a PUBLIC repo it uploads tokenlessly.
      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v7
        with:
          files: ./lcov.info
          token: ${{ secrets.CODECOV_TOKEN }}
          fail_ci_if_error: false
